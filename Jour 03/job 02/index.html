<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Job 02 - Arc-en-ciel</title>
</head>
<body>

  <h2>Arc-en-ciel</h2>

  <!-- Bouton pour mélanger les images -->
  <button id="btn-melanger">Mélanger</button>

  <!-- Zone où les images mélangées apparaissent (à glisser-déposer) -->
  <div id="zone-melange">
    <!-- Les images mélangées seront insérées ici par JS -->
  </div>

  <br>

  <!-- Zone de dépôt numérotée : 6 cases pour replacer les images dans l'ordre -->
  <div id="zone-ordre">
    <div class="case" data-position="1"></div>
    <div class="case" data-position="2"></div>
    <div class="case" data-position="3"></div>
    <div class="case" data-position="4"></div>
    <div class="case" data-position="5"></div>
    <div class="case" data-position="6"></div>
  </div>

  <!-- Bouton pour vérifier l'ordre -->
  <br>
  <button id="btn-verifier">Vérifier</button>

  <!-- Message résultat -->
  <p id="message"></p>

  <!-- jQuery depuis CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
