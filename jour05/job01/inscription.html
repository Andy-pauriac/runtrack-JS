<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Inscription</h1>

    <a href="inscription.html">Inscription</a> |
    <a href="connexion.html">Connexion</a>

    <br><br>

    <form id="formInscription">

        <label>Prénom :</label><br>
        <input type="text" id="prenom"><br>
        <span class="erreur" id="erreurPrenom"></span>

        <br>

        <label>Nom :</label><br>
        <input type="text" id="nom"><br>
        <span class="erreur" id="erreurNom"></span>

        <br>

        <label>Email :</label><br>
        <input type="text" id="email"><br>
        <span class="erreur" id="erreurEmail"></span>

        <br>

        <label>Mot de passe :</label><br>
        <input type="password" id="motdepasse"><br>
        <span class="erreur" id="erreurMotdepasse"></span>

        <br>

        <label>Confirmer le mot de passe :</label><br>
        <input type="password" id="confirmation"><br>
        <span class="erreur" id="erreurConfirmation"></span>

        <br>

        <label>Adresse :</label><br>
        <input type="text" id="adresse"><br>
        <span class="erreur" id="erreurAdresse"></span>

        <br>

        <label>Code postal :</label><br>
        <input type="text" id="codepostal"><br>
        <span class="erreur" id="erreurCodepostal"></span>

        <br><br>

        <button type="button" onclick="validerInscription()">S'inscrire</button>

        <p id="succes" style="display:none; color:green;">Inscription réussie !</p>

    </form>

    <script src="validation.js"></script>
</body>
</html>
