<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Somme Nombres Premiers</title>
</head>
<body>
    <h1>Somme de deux nombres premiers</h1>

    <label for="a">Nombre A :</label>
    <input type="number" id="a" min="2">

    <label for="b">Nombre B :</label>
    <input type="number" id="b" min="2">

    <button onclick="tester()">Calculer</button>

    <p id="resultat"></p>

    <script src="script.js"></script>
    <script>
        function tester() {
            var a = parseInt(document.getElementById("a").value);
            var b = parseInt(document.getElementById("b").value);
            var p = document.getElementById("resultat");

            if (isNaN(a) || isNaN(b)) {
                p.textContent = "Veuillez entrer deux nombres.";
                return;
            }

            var resultat = sommeNombresPremiers(a, b);

            if (resultat === false) {
                p.textContent = a + " et " + b + " : au moins l'un d'eux n'est pas premier → false";
            } else {
                p.textContent = a + " + " + b + " = " + resultat;
            }
        }
    </script>
</body>
</html>
